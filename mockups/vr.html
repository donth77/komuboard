<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Coboard — VR window mode</title>
<link rel="stylesheet" href="./tokens.css">
<style>
  /* ===== VR immersive scene ===== */
  .vr{position:absolute;inset:0;overflow:hidden;perspective:1700px;perspective-origin:50% 42%;
    background:
      radial-gradient(120% 90% at 50% 8%, #1a2230 0%, #141a25 40%, #0e1116 78%);}
  /* soft horizon glow band behind the board */
  .horizon{position:absolute;left:50%;top:36%;transform:translate(-50%,-50%);width:1500px;height:620px;
    background:radial-gradient(60% 60% at 50% 50%, rgba(91,141,239,.16), rgba(124,58,237,.06) 46%, transparent 70%);
    filter:blur(8px);pointer-events:none}
  /* faint ground reflection line */
  .floor{position:absolute;left:0;right:0;bottom:0;height:42%;
    background:linear-gradient(to bottom, transparent, rgba(11,15,22,.65) 70%, rgba(8,11,16,.9));pointer-events:none}
  /* comfort vignette — radial darkening at screen edges */
  .vignette{position:absolute;inset:0;pointer-events:none;z-index:60;
    background:radial-gradient(130% 110% at 50% 46%, transparent 52%, rgba(0,0,0,.34) 80%, rgba(0,0,0,.62) 100%)}
  /* faint floating ambient dust dots */
  .dust{position:absolute;border-radius:50%;background:#5b8def;opacity:.10;filter:blur(.5px);pointer-events:none}

  /* ===== THE BOARD PANEL (the window into the infinite canvas) ===== */
  .stage{position:absolute;left:50%;top:40%;transform:translate(-50%,-50%);
    transform-style:preserve-3d}
  .board-wrap{transform:rotateX(7deg);transform-style:preserve-3d}
  .board{position:relative;width:760px;height:452px;border-radius:26px;overflow:hidden;
    background:radial-gradient(120% 140% at 50% -10%, #20283a, #141923 60%, #10141d);
    border:1px solid #2a3344;
    box-shadow:
      0 60px 120px rgba(0,0,0,.62),
      0 24px 60px rgba(0,0,0,.5),
      0 0 0 1px rgba(91,141,239,.10),
      0 0 70px rgba(91,141,239,.10);}
  /* subtle horizontal curve illusion via inner side shading */
  .board::before{content:"";position:absolute;inset:0;pointer-events:none;z-index:8;border-radius:26px;
    background:linear-gradient(90deg, rgba(8,10,15,.42), transparent 14%, transparent 86%, rgba(8,10,15,.42));}
  /* faint top sheen / glass reflection */
  .board::after{content:"";position:absolute;left:0;right:0;top:0;height:46%;pointer-events:none;z-index:9;border-radius:26px 26px 0 0;
    background:linear-gradient(to bottom, rgba(255,255,255,.06), transparent);}
  /* dot-grid canvas inside the window */
  .board .surface{position:absolute;inset:0;
    background:radial-gradient(rgba(120,135,160,.20) 1.3px,transparent 1.3px);background-size:24px 24px;background-position:-1px -1px}

  .b-node{position:absolute}
  .b-sticky{width:118px;min-height:74px;padding:11px;border-radius:6px;box-shadow:0 8px 22px rgba(0,0,0,.45);
    font-weight:600;font-size:12.5px;line-height:1.3;color:#1a1505;font-family:Inter,sans-serif}
  .b-sticky.y{background:#ffe27a} .b-sticky.g{background:#bbf2c4} .b-sticky.b{background:#bcdcff}
  .b-frame{position:absolute;border:1.5px dashed #3a4658;border-radius:12px}
  .b-frame .ft{position:absolute;top:-10px;left:12px;background:#141923;padding:0 7px;font-size:11px;font-weight:700;color:var(--ink-2)}
  .b-shape{position:absolute;border:2.5px solid var(--accent);border-radius:9px;background:rgba(91,141,239,.13)}
  .b-label{position:absolute;font-size:12px;font-weight:700;color:var(--ink)}

  /* ===== OFF-VIEWPORT EDGE INDICATORS ===== */
  .edge-pill{position:absolute;z-index:14;display:inline-flex;align-items:center;gap:6px;height:26px;padding:0 10px;
    border-radius:var(--radius-full);font-size:12px;font-weight:700;color:#fff;white-space:nowrap;
    background:color-mix(in srgb, var(--surface) 78%, transparent);backdrop-filter:blur(6px);
    border:1px solid var(--border-2);box-shadow:var(--shadow-1)}
  .edge-pill .av{width:16px;height:16px;border-radius:50%;display:grid;place-items:center;font-size:9px;font-weight:800;color:#fff}
  .edge-pill .cnt{color:var(--ink)}

  /* ===== MINIMAP inset (docked bottom-right of board) ===== */
  .vr-mini{position:absolute;right:14px;bottom:14px;width:176px;height:116px;z-index:18;
    background:color-mix(in srgb,var(--surface) 92%,transparent);border:1px solid var(--border-2);
    border-radius:12px;box-shadow:var(--shadow-2);overflow:hidden}
  .vr-mini .mlabel{position:absolute;top:7px;left:9px;font-size:9.5px;font-weight:700;letter-spacing:.05em;color:var(--ink-3);text-transform:uppercase;z-index:2}
  .vr-mini .mini-grid{position:absolute;inset:0;background:radial-gradient(var(--grid) 1px,transparent 1px);background-size:12px 12px;opacity:.7}
  .vp-rect{position:absolute;border:2px solid var(--accent);border-radius:4px;background:color-mix(in srgb,var(--accent) 16%,transparent)}
  .vp-rect.other{border-style:dashed}

  /* ===== HUD chrome (top center) ===== */
  .hud{position:absolute;top:22px;left:50%;transform:translateX(-50%);z-index:55;display:flex;align-items:center;gap:10px}
  .hud-pill{display:inline-flex;align-items:center;gap:9px;height:36px;padding:0 14px;border-radius:var(--radius-full);
    background:color-mix(in srgb,var(--surface) 70%,transparent);backdrop-filter:blur(12px);
    border:1px solid var(--border-2);box-shadow:var(--shadow-2);font-size:13px;font-weight:600;color:var(--ink)}
  .hud-pill .vr-dot{width:9px;height:9px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 4px color-mix(in srgb,var(--accent) 24%,transparent)}
  .hud-pill .muted{color:var(--ink-3);font-weight:500}
  .hud-btn{display:inline-flex;align-items:center;gap:7px;height:36px;padding:0 13px;border-radius:var(--radius-full);
    background:color-mix(in srgb,var(--surface) 70%,transparent);backdrop-filter:blur(12px);
    border:1px solid var(--border-2);box-shadow:var(--shadow-1);font-size:12.5px;font-weight:600;color:var(--ink-2);cursor:pointer}
  .hud-btn svg{width:15px;height:15px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
  .hud-btn.exit{color:#ff9b9b;border-color:color-mix(in srgb,var(--danger) 40%,var(--border-2))}

  /* ===== Avatars / hands ===== */
  .laser-layer{position:absolute;inset:0;z-index:40;pointer-events:none;overflow:visible}

  /* remote avatar (Maya) — head + two hands */
  .remote{position:absolute;z-index:38}
  .head{width:58px;height:58px;border-radius:18px;background:linear-gradient(150deg,#3f74ee,#2456c9);
    box-shadow:0 14px 34px rgba(37,99,235,.4),inset 0 1px 0 rgba(255,255,255,.25);position:relative;
    border:1px solid rgba(255,255,255,.18)}
  /* VR headset band on the head */
  .head .visor{position:absolute;left:6px;right:6px;top:18px;height:18px;border-radius:6px;
    background:linear-gradient(#0c1422,#070d18);box-shadow:inset 0 1px 3px rgba(0,0,0,.7);border:1px solid rgba(255,255,255,.06)}
  .head .visor::after{content:"";position:absolute;left:8px;top:5px;width:14px;height:5px;border-radius:3px;background:rgba(120,170,255,.5);filter:blur(1px)}
  .hand{position:absolute;width:26px;height:34px;border-radius:13px;background:linear-gradient(150deg,#3f74ee,#2456c9);
    box-shadow:0 8px 20px rgba(37,99,235,.42),inset 0 1px 0 rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.16)}
  .name-tag{position:absolute;white-space:nowrap;color:#fff;font-size:11.5px;font-weight:700;
    padding:3px 9px;border-radius:var(--radius-full);box-shadow:var(--shadow-1)}
  .hit-dot{position:absolute;z-index:42;width:13px;height:13px;border-radius:50%;
    box-shadow:0 0 0 4px color-mix(in srgb,var(--u1) 30%,transparent),0 0 14px var(--u1)}
  .hit-dot .lbl{position:absolute;left:18px;top:-3px;white-space:nowrap;font-size:11px;font-weight:700;color:#fff;
    background:var(--u1);padding:2px 8px;border-radius:var(--radius-full);box-shadow:var(--shadow-1)}

  /* local controllers (bottom corners) */
  .controller{position:absolute;bottom:-14px;z-index:50;width:64px;height:96px}
  .ctrl-body{position:absolute;bottom:0;width:46px;height:70px;border-radius:22px 22px 16px 16px;
    background:linear-gradient(155deg,#2b3342,#1a212d);border:1px solid #39455a;
    box-shadow:0 -8px 26px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.08)}
  .ctrl-ring{position:absolute;top:0;left:50%;transform:translateX(-50%);width:50px;height:50px;border-radius:50%;
    border:5px solid #4b5870;box-shadow:0 -6px 18px rgba(0,0,0,.4),inset 0 0 8px rgba(0,0,0,.5)}
  .ctrl-trigger{position:absolute;left:50%;top:30px;transform:translateX(-50%);width:14px;height:14px;border-radius:50%;
    background:var(--accent);box-shadow:0 0 0 4px color-mix(in srgb,var(--accent) 26%,transparent),0 0 12px var(--accent)}

  /* ink trail at the laser hit point on the board */
  .ink-trail{position:absolute;z-index:44;pointer-events:none}

  /* ===== WRIST / HAND TOOL PALETTE (near left controller) ===== */
  .wrist{position:absolute;z-index:52;width:74px;padding:9px 8px;border-radius:20px;
    background:color-mix(in srgb,var(--surface) 86%,transparent);backdrop-filter:blur(12px);
    border:1px solid var(--border-2);box-shadow:var(--shadow-3);transform:rotate(-7deg)}
  .wrist .wt-title{font-size:9px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-3);
    text-align:center;margin-bottom:7px}
  .wrist .wstrip{display:flex;flex-direction:column;gap:5px}
  .wtool{height:46px;border-radius:13px;display:grid;place-items:center;color:var(--ink-2);background:transparent;
    border:1px solid transparent}
  .wtool svg{width:21px;height:21px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
  .wtool.active{background:var(--accent);color:var(--accent-ink);box-shadow:var(--shadow-1)}
  .wtool.swatch{flex-direction:row}
  .wrist .reach{position:absolute;left:50%;bottom:-22px;transform:translateX(-50%);white-space:nowrap;
    font-size:9.5px;font-weight:700;letter-spacing:.03em;color:var(--ink-3);
    background:color-mix(in srgb,var(--surface) 70%,transparent);padding:2px 8px;border-radius:var(--radius-full);border:1px solid var(--border)}

  /* subtle distance / zone label near the board */
  .zone-tag{position:absolute;z-index:20;font-size:10.5px;font-weight:700;letter-spacing:.04em;color:var(--ink-3);
    display:inline-flex;align-items:center;gap:6px}
  .zone-tag .ln{width:26px;height:1px;background:var(--border-2)}
</style>
</head>
<body>
<div class="vr">

  <!-- environment -->
  <div class="horizon"></div>
  <div class="dust" style="left:18%;top:24%;width:5px;height:5px"></div>
  <div class="dust" style="left:80%;top:30%;width:4px;height:4px;opacity:.07"></div>
  <div class="dust" style="left:30%;top:64%;width:6px;height:6px;opacity:.06"></div>
  <div class="dust" style="left:68%;top:70%;width:5px;height:5px;opacity:.08"></div>
  <div class="dust" style="left:12%;top:54%;width:4px;height:4px;opacity:.06"></div>

  <!-- distance / reach zone label, subtle -->
  <div class="zone-tag" style="left:50%;top:13%;transform:translateX(-50%)"><span class="ln"></span>Board · 1.4 m · Shared reach<span class="ln"></span></div>

  <!-- ===== THE BOARD PANEL ===== -->
  <div class="stage">
    <div class="board-wrap">
      <div class="board">
        <div class="surface"></div>

        <!-- vector layer: freehand stroke + connector inside the window -->
        <svg class="ink-trail" style="left:0;top:0;width:100%;height:100%" viewBox="0 0 760 452" preserveAspectRatio="none">
          <!-- connector: shape -> sticky -->
          <path d="M150 132 C 210 150, 250 150, 286 166" stroke="var(--ink-2)" stroke-width="2.2" fill="none"/>
          <!-- freehand ink stroke -->
          <path d="M196 322 q 26 -28 54 -6 q 22 18 50 -2 q 26 -18 48 4" stroke="var(--u7)" stroke-width="3.2" fill="none" stroke-linecap="round"/>
        </svg>

        <!-- frame -->
        <div class="b-frame" style="left:264px;top:122px;width:336px;height:236px"><span class="ft">Sprint 24 · Retro</span></div>

        <!-- shape + label -->
        <div class="b-shape" style="left:62px;top:96px;width:120px;height:78px"></div>
        <div class="b-label" style="left:84px;top:126px;color:var(--accent)">API gateway</div>

        <!-- stickies -->
        <div class="b-node b-sticky y" style="left:288px;top:148px;transform:rotate(-1.4deg)">Pair on the sync engine early</div>
        <div class="b-node b-sticky g" style="left:430px;top:158px;transform:rotate(1.2deg)">Keep the Friday demo 🎉</div>
        <div class="b-node b-sticky b" style="left:300px;top:250px;transform:rotate(.8deg)">Spike WebXR hand-tracking</div>

        <!-- a small textual heading -->
        <div class="b-label" style="left:60px;top:46px;font-size:16px">Q3 Planning</div>
        <div class="b-label" style="left:60px;top:70px;font-size:11px;color:var(--ink-3);font-weight:600">Team sync · everyone can edit</div>

        <!-- OFF-VIEWPORT EDGE INDICATORS -->
        <div class="edge-pill" style="left:14px;top:50%;transform:translateY(-50%)">
          <span class="av" style="background:var(--u1)">M</span>Maya
        </div>
        <div class="edge-pill" style="right:200px;top:18px">
          <span class="cnt">3</span>
          <svg width="13" height="13" viewBox="0 0 24 24" style="stroke:var(--ink-2);stroke-width:2.4;fill:none;stroke-linecap:round;stroke-linejoin:round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
        </div>
        <div class="edge-pill" style="left:50%;bottom:14px;transform:translateX(-50%)">
          <svg width="13" height="13" viewBox="0 0 24 24" style="stroke:var(--ink-2);stroke-width:2.4;fill:none;stroke-linecap:round;stroke-linejoin:round"><path d="M12 5v14M6 13l6 6 6-6"/></svg>
          <span class="cnt">Roadmap frame</span>
        </div>

        <!-- laser hit point (remote — Maya pointing) -->
        <div class="hit-dot" style="left:420px;top:206px;background:var(--u1)"><span class="lbl">Maya</span></div>

        <!-- local ink trail at right-controller laser hit -->
        <svg class="ink-trail" style="left:506px;top:296px;width:80px;height:60px;overflow:visible" viewBox="0 0 80 60">
          <path d="M4 40 q 16 -30 34 -8 q 12 16 30 -10" stroke="var(--accent)" stroke-width="3.4" fill="none" stroke-linecap="round"/>
          <circle cx="68" cy="22" r="5" fill="var(--accent)"/>
        </svg>

        <!-- MINIMAP inset docked into board corner -->
        <div class="vr-mini">
          <div class="mini-grid"></div>
          <span class="mlabel">Infinite canvas</span>
          <!-- content blobs -->
          <span style="position:absolute;left:40px;top:44px;width:42px;height:26px;border:1.4px dashed var(--border-2);border-radius:4px"></span>
          <span style="position:absolute;left:46px;top:49px;width:8px;height:8px;background:#ffe27a;border-radius:2px"></span>
          <span style="position:absolute;left:57px;top:49px;width:8px;height:8px;background:#bbf2c4;border-radius:2px"></span>
          <span style="position:absolute;left:68px;top:49px;width:8px;height:8px;background:#bcdcff;border-radius:2px"></span>
          <span style="position:absolute;left:20px;top:46px;width:14px;height:10px;background:rgba(91,141,239,.34);border:1px solid var(--accent);border-radius:2px"></span>
          <span style="position:absolute;left:110px;top:64px;width:9px;height:9px;background:#f7c8e8;border-radius:2px"></span>
          <span style="position:absolute;left:124px;top:40px;width:8px;height:8px;background:#ffe27a;border-radius:2px"></span>
          <!-- my viewport rect (current window) -->
          <span class="vp-rect" style="left:30px;top:36px;width:64px;height:42px"></span>
          <!-- other person -->
          <span class="vp-rect other" style="left:96px;top:54px;width:46px;height:34px;border-color:var(--u1)"></span>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== Lasers (over the scene) ===== -->
  <svg class="laser-layer" viewBox="0 0 1280 800" preserveAspectRatio="none">
    <defs>
      <linearGradient id="laserMaya" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0" stop-color="var(--u1)" stop-opacity="0"/>
        <stop offset="1" stop-color="var(--u1)" stop-opacity="1"/>
      </linearGradient>
      <linearGradient id="laserLocal" x1="0" y1="1" x2="1" y2="0">
        <stop offset="0" stop-color="var(--accent)" stop-opacity="1"/>
        <stop offset="1" stop-color="var(--accent)" stop-opacity=".85"/>
      </linearGradient>
    </defs>
    <!-- Maya's laser: from her right hand to the hit dot on the board -->
    <path d="M152 372 L 680 412" stroke="url(#laserMaya)" stroke-width="2.6" fill="none" stroke-linecap="round"/>
    <path d="M152 372 L 680 412" stroke="var(--u1)" stroke-width="7" fill="none" stroke-linecap="round" opacity=".12"/>
    <!-- Local user's right controller laser: from bottom-right up to the ink hit point -->
    <path d="M1118 760 L 826 478" stroke="url(#laserLocal)" stroke-width="2.8" fill="none" stroke-linecap="round"/>
    <path d="M1118 760 L 826 478" stroke="var(--accent)" stroke-width="9" fill="none" stroke-linecap="round" opacity=".12"/>
  </svg>

  <!-- ===== REMOTE AVATAR (Maya) — head + two hands ===== -->
  <div class="remote" style="left:78px;top:296px">
    <div class="head"><div class="visor"></div></div>
    <span class="name-tag" style="left:-4px;top:64px;background:var(--u1)">Maya</span>
    <!-- left hand -->
    <div class="hand" style="left:-18px;top:62px;transform:rotate(-12deg)"></div>
    <!-- right hand (the pointing one) -->
    <div class="hand" style="left:60px;top:58px;transform:rotate(16deg)"></div>
  </div>

  <!-- ===== LOCAL controllers (bottom corners) ===== -->
  <!-- LEFT controller (non-dominant) with wrist palette -->
  <div class="controller" style="left:96px">
    <div class="ctrl-ring"></div>
    <div class="ctrl-body"></div>
    <div class="ctrl-trigger" style="background:var(--ink-3);box-shadow:none"></div>
  </div>
  <!-- WRIST / HAND TOOL PALETTE anchored near the left controller (Personal reach zone) -->
  <div class="wrist" style="left:170px;bottom:108px">
    <div class="wt-title">Tools</div>
    <div class="wstrip">
      <div class="wtool active" title="Pen"><svg viewBox="0 0 24 24"><path d="M17 3a2.83 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5z"/></svg></div>
      <div class="wtool" title="Sticky note"><svg viewBox="0 0 24 24"><path d="M15.5 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10l6-6V5a2 2 0 0 0-2-2z"/><path d="M15 21v-4a2 2 0 0 1 2-2h4"/></svg></div>
      <div class="wtool" title="Eraser"><svg viewBox="0 0 24 24"><path d="M7 21l-4.3-4.3a1 1 0 0 1 0-1.4l9.6-9.6a2 2 0 0 1 2.8 0l4.6 4.6a2 2 0 0 1 0 2.8L13 21"/><path d="M22 21H7"/></svg></div>
      <div class="wtool" title="Grab / move"><svg viewBox="0 0 24 24"><path d="M18 11V6a2 2 0 0 0-4 0M14 10V4a2 2 0 0 0-4 0v2M10 10.5V6a2 2 0 0 0-4 0v8a8 8 0 0 0 8 8 8 8 0 0 0 8-8v-3a2 2 0 0 0-4 0"/></svg></div>
    </div>
    <span class="reach">Personal reach</span>
  </div>

  <!-- RIGHT controller (dominant — drawing) -->
  <div class="controller" style="right:96px">
    <div class="ctrl-ring" style="border-color:#5b8def;box-shadow:0 -6px 20px rgba(91,141,239,.35),inset 0 0 8px rgba(0,0,0,.5)"></div>
    <div class="ctrl-body" style="border-color:#3b4a66"></div>
    <div class="ctrl-trigger"></div>
  </div>

  <!-- ===== HUD chrome ===== -->
  <div class="hud">
    <div class="hud-pill"><span class="vr-dot"></span>You are in VR <span class="muted">· Window mode</span></div>
    <div class="hud-btn"><svg viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 3-6.7M3 4v4h4"/></svg>Recenter</div>
    <div class="hud-btn exit"><svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg>Exit VR</div>
  </div>

  <!-- ground + comfort vignette overlays -->
  <div class="floor"></div>
  <div class="vignette"></div>

</div>
</body>
</html>
