<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coboard VR (placeholder)</title>
    <!-- M0 placeholder scene. M4 replaces this with the board-as-viewport-window
         renderer bound to the same Yjs document (see docs/04 §6.5, docs/06 M4). -->
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  </head>
  <body>
    <a-scene background="color: #0e1116">
      <a-entity position="0 1.6 0">
        <a-plane
          position="0 0 -2"
          width="2"
          height="1.2"
          color="#171a21"
          material="side: double"
        ></a-plane>
        <a-text
          value="Coboard VR — M0 placeholder\nWindow-mode board lands in M4"
          align="center"
          position="0 0 -1.98"
          width="2.4"
          color="#e6e9ef"
        ></a-text>
      </a-entity>
      <a-sky color="#0b0e13"></a-sky>
    </a-scene>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
