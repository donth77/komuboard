# Komuboard realtime backend — Cloudflare Worker + Durable Objects (PartyServer).
# Runs on the free tier: one Durable Object per room, WebSocket Hibernation,
# SQLite-backed storage. See docs/04-technical-architecture.md and docs/05-scaling-and-cost.md.
name = "komuboard-worker"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]
# Skip Wrangler's first-run telemetry prompt so `pnpm dev` starts non-interactively.
send_metrics = false

# Public custom domain for the realtime backend (WebSocket sync + image upload/serve). On deploy,
# Cloudflare provisions the DNS record + TLS cert for this hostname; the worker also stays reachable
# at its *.workers.dev URL. The web client is built with VITE_WORKER_HOST=api.komuboard.app.
routes = [{ pattern = "api.komuboard.app", custom_domain = true }]
# Keep the *.workers.dev URL live too (fallback + debug origin); adding routes disables it otherwise.
workers_dev = true

# One Durable Object per room. Bound as "Main" so PartyServer routes it at
# /parties/main/:roomId (see packages/shared PARTY).
[[durable_objects.bindings]]
name = "Main"
class_name = "Board"

# SQLite-backed Durable Object (free-tier eligible; co-located room persistence).
[[migrations]]
tag = "v1"
new_sqlite_classes = ["Board"]

# R2 bucket for uploaded images — bytes only; the Yjs doc holds the content-hash key. Local dev uses
# miniflare's simulated R2; production needs `wrangler r2 bucket create komuboard-uploads`. Zero egress.
[[r2_buckets]]
binding = "UPLOADS"
bucket_name = "komuboard-uploads"

[observability]
enabled = true

# ── Orphan-image sweep (SEC-R2) — DISABLED until enabled deliberately ────────────────────────────
# The code ships live and is safe while unbound: the Board DO's index writes AND the scheduled sweep
# both no-op when ASSET_INDEX is absent. Left commented so a placeholder namespace id can't block an
# unrelated `wrangler deploy`. TO TURN ON:
#   1. wrangler kv namespace create ASSET_INDEX
#   2. paste the returned id below and uncomment BOTH blocks
#   3. wrangler deploy   (early sweeps abort safely until rooms save + populate the index)
# The DO writes room→image-keys to KV on save; the weekly scheduled() handler unions them and deletes
# R2 objects referenced by no room and older than the 7-day grace window (with hard aborts on an
# empty/unreadable index and a >50% circuit breaker).
# [[kv_namespaces]]
# binding = "ASSET_INDEX"
# id = "PASTE_KV_NAMESPACE_ID_HERE"
#
# [triggers]
# crons = ["0 4 * * 0"]   # weekly, Sunday 04:00 UTC

# Per-IP rate limit for the /upload endpoint (an unauthenticated POST that stores 5MB blobs in R2).
# Cloudflare's native rate-limiting binding: 30 uploads / 60s / IP. The binding is optional in code,
# so local dev / miniflare without it simply skips the check.
[[unsafe.bindings]]
name = "UPLOAD_RL"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 30, period = 60 }

# Per-IP join rate limit — bounds room-id ENUMERATION (a scanner makes one WS connection per guess).
# 60 / 10s = 6/s: legit multi-tab/reconnect never trips it; a scanner is throttled to years. Optional
# in code (skipped in local dev).
[[unsafe.bindings]]
name = "JOIN_RL"
type = "ratelimit"
namespace_id = "1002"
simple = { limit = 60, period = 10 }
