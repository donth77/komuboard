# Coboard realtime backend — Cloudflare Worker + Durable Objects (PartyServer).
# Runs on the free tier: one Durable Object per room, WebSocket Hibernation,
# SQLite-backed storage. See docs/04-technical-architecture.md and docs/05-scaling-and-cost.md.
name = "coboard-worker"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]
# Skip Wrangler's first-run telemetry prompt so `pnpm dev` starts non-interactively.
send_metrics = false

# One Durable Object per room. Bound as "Main" so PartyServer routes it at
# /parties/main/:roomId (see packages/shared PARTY).
[[durable_objects.bindings]]
name = "Main"
class_name = "Board"

# SQLite-backed Durable Object (free-tier eligible; co-located room persistence).
[[migrations]]
tag = "v1"
new_sqlite_classes = ["Board"]

[observability]
enabled = true
